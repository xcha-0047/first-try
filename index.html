<!DOCTYPE html>\n<html lang='en'>\n<head>\n    <meta charset='UTF-8'>\n    <meta name='viewport' content='width=device-width, initial-scale=1.0'>\n    <title>Pong Game</title>\n    <style>\n        body {\n            display: flex;\n            justify-content: center;\n            align-items: center;\n            height: 100vh;\n            margin: 0;\n            background-color: black;\n        }\n        canvas {\n            border: 1px solid white;\n        }\n    </style>\n</head>\n<body>\n    <canvas id='pong' width='800' height='400'></canvas>\n    <script>\n        const canvas = document.getElementById('pong');\n        const context = canvas.getContext('2d');\n        const user = {\n            x: 0,\n            y: canvas.height / 2 - 50,\n            width: 10,\n            height: 100,\n            color: 'white',\n            score: 0\n        };\n        const computer = {\n            x: canvas.width - 10,\n            y: canvas.height / 2 - 50,\n            width: 10,\n            height: 100,\n            color: 'white',\n            score: 0\n        };\n        const ball = {\n            x: canvas.width / 2,\n            y: canvas.height / 2,\n            radius: 10,\n            speed: 4,\n            velocityX: 4,\n            velocityY: 4,\n            color: 'white'\n        };\n        const net = {\n            x: canvas.width / 2 - 1,\n            y: 0,\n            width: 2,\n            height: 10\n        };\n        function drawRect(x, y, w, h, color) {\n            context.fillStyle = color;\n            context.fillRect(x, y, w, h);\n        }\n        function drawArc(x, y, r, color) {\n            context.fillStyle = color;\n            context.beginPath();\n            context.arc(x, y, r, 0, Math.PI * 2, false);\n            context.closePath();\n            context.fill();\n        }\n        function drawNet() {\n            for (let i = 0; i < canvas.height; i += 15) {\n                drawRect(net.x, net.y + i, net.width, net.height);\n            }\n        }\n        function drawText(text, x, y) {\n            context.fillStyle = 'white';\n            context.font = '35px Arial';\n            context.fillText(text, x, y);\n        }\n        function update() {\n            ball.x += ball.velocityX;\n            ball.y += ball.velocityY;\n            if (ball.y + ball.radius > canvas.height || ball.y - ball.radius < 0) {\n                ball.velocityY = -ball.velocityY;\n            }\n            let player = (ball.x < canvas.width / 2) ? user : computer;\n            if (collision(ball, player)) {\n                ball.velocityX = -ball.velocityX;            }\n            if (ball.x - ball.radius < 0) {\n                computer.score++;\n                resetBall();\n            } else if (ball.x + ball.radius > canvas.width) {\n                user.score++;\n                resetBall();\n            }\n            computerAI();\n        }\n        function collision(ball, player) {\n            player.top = player.y;\n            player.bottom = player.y + player.height;\n            player.left = player.x;\n            player.right = player.x + player.width;\n            ball.top = ball.y - ball.radius;\n            ball.bottom = ball.y + ball.radius;\n            ball.left = ball.x - ball.radius;\n            ball.right = ball.x + ball.radius;\n            return (ball.right > player.left && ball.left < player.right && ball.bottom > player.top && ball.top < player.bottom);\n        }\n        function computerAI() {\n            if (computer.y < ball.y - computer.height / 2) {\n                computer.y += 4;\n            } else {\n                computer.y -= 4;\n            }\n        }\n        function resetBall() {\n            ball.x = canvas.width / 2;\n            ball.y = canvas.height / 2;\n            ball.velocityX = -ball.velocityX;\n        }\n        document.addEventListener('mousemove', (event) => {\n            user.y = event.clientY - canvas.offsetTop - user.height / 2;\n            if (user.y < 0) user.y = 0;\n            if (user.y + user.height > canvas.height) user.y = canvas.height - user.height;\n        });\n        document.addEventListener('keydown', (event) => {\n            switch (event.key) {\n                case 'ArrowUp':\n                    user.y -= 20;\n                    break;\n                case 'ArrowDown':\n                    user.y += 20;\n                    break;\n            }\n        });\n        function gameLoop() {\n            context.clearRect(0, 0, canvas.width, canvas.height);\n            drawNet();\n            drawText(user.score, canvas.width / 4, canvas.height / 5);\n            drawText(computer.score, 3 * canvas.width / 4, canvas.height / 5);\n            drawRect(user.x, user.y, user.width, user.height, user.color);\n            drawRect(computer.x, computer.y, computer.width, computer.height, computer.color);\n            drawArc(ball.x, ball.y, ball.radius, ball.color);\n            update();\n            requestAnimationFrame(gameLoop);\n        }\n        gameLoop();\n    </script>\n</body>\n</html>\n

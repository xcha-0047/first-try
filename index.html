<html lang="zh-CN">
<head>

    <style>
        :root {
            --sky-top: #030617;
            --sky-mid: #071432;
            --sky-bottom: #10254a;
            --mist: rgba(145, 196, 255, 0.14);
            --star-core: #fff7da;
            --star-glow: rgba(255, 235, 158, 0.8);
            --star-ring: rgba(160, 225, 255, 0.42);
            --wish-text: #fff6d6;
            --wish-outline: rgba(85, 32, 54, 0.45);
            --accent: #ff9dc4;
        }

        * {
            box-sizing: border-box;
        }

        html, body {
            margin: 0;
            min-height: 100%;
        }

        body {
            overflow: hidden;
            font-family: "Microsoft YaHei", "PingFang SC", "Hiragino Sans GB", sans-serif;
            background:
                radial-gradient(circle at 20% 20%, rgba(109, 154, 255, 0.16), transparent 30%),
                radial-gradient(circle at 80% 18%, rgba(255, 170, 210, 0.12), transparent 26%),
                radial-gradient(circle at 50% 72%, rgba(126, 193, 255, 0.12), transparent 32%),
                linear-gradient(180deg, var(--sky-top) 0%, var(--sky-mid) 45%, var(--sky-bottom) 100%);
            color: #fff;
        }

        .scene {
            position: relative;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            isolation: isolate;
        }

        .scene::before,
        .scene::after {
            content: "";
            position: absolute;
            inset: auto;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(18px);
            opacity: 0.85;
        }

        .scene::before {
            width: 32vmin;
            height: 32vmin;
            left: -8vmin;
            bottom: -10vmin;
            background: var(--mist);
        }

        .scene::after {
            width: 26vmin;
            height: 26vmin;
            right: -5vmin;
            top: 8vmin;
            background: rgba(255, 174, 210, 0.13);
        }

        .dust,
        .heart-stars,
        .wish-layer,
        .hint {
            position: absolute;
            inset: 0;
        }

        .dust-point {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            box-shadow: 0 0 8px rgba(255, 255, 255, 0.35);
            animation: dustTwinkle linear infinite;
            pointer-events: none;
        }

        .title-wrap {
            position: absolute;
            top: 6vh;
            left: 50%;
            transform: translateX(-50%);
            width: min(88vw, 760px);
            text-align: center;
            z-index: 4;
            pointer-events: none;
        }

        .title-wrap h1 {
            margin: 0;
            font-size: clamp(2rem, 5vw, 4.2rem);
            font-weight: 700;
            letter-spacing: 0.12em;
            color: #fffaf2;
            text-shadow:
                0 0 12px rgba(255, 223, 160, 0.55),
                0 0 24px rgba(255, 172, 210, 0.25);
        }

        .title-wrap p {
            margin: 0.9rem auto 0;
            width: min(72vw, 560px);
            font-size: clamp(0.95rem, 2vw, 1.2rem);
            line-height: 1.8;
            color: rgba(240, 245, 255, 0.82);
            text-shadow: 0 0 10px rgba(16, 36, 83, 0.7);
        }

        .heart-stars {
            z-index: 3;
        }

        .star {
            position: absolute;
            width: var(--size);
            height: var(--size);
            transform: translate(-50%, -50%);
            border: 0;
            padding: 0;
            border-radius: 50%;
            cursor: pointer;
            background:
                radial-gradient(circle, rgba(255, 255, 255, 0.98) 0 22%, rgba(255, 249, 219, 0.96) 22% 42%, rgba(255, 236, 164, 0.6) 42% 62%, rgba(255, 236, 164, 0) 63%);
            box-shadow:
                0 0 10px rgba(255, 237, 163, 0.95),
                0 0 22px rgba(141, 221, 255, 0.55),
                0 0 36px rgba(255, 188, 221, 0.34);
            animation:
                twinkle var(--twinkle-duration) ease-in-out infinite,
                floatDrift var(--float-duration) ease-in-out infinite;
            animation-delay: var(--delay), calc(var(--delay) * -1.7);
        }

        .star::before,
        .star::after {
            content: "";
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border-radius: 999px;
            pointer-events: none;
        }

        .star::before {
            width: 200%;
            height: 24%;
            background: linear-gradient(90deg, transparent 0%, rgba(255, 250, 228, 0.88) 50%, transparent 100%);
            filter: blur(0.8px);
            opacity: 0.8;
        }

        .star::after {
            width: 24%;
            height: 200%;
            background: linear-gradient(180deg, transparent 0%, rgba(255, 250, 228, 0.88) 50%, transparent 100%);
            filter: blur(0.8px);
            opacity: 0.8;
        }

        .star:hover {
            transform: translate(-50%, -50%) scale(1.25);
            box-shadow:
                0 0 16px rgba(255, 237, 163, 1),
                0 0 34px rgba(141, 221, 255, 0.78),
                0 0 52px rgba(255, 188, 221, 0.45);
        }

        .star:active {
            transform: translate(-50%, -50%) scale(0.94);
        }

        .wish-layer {
            z-index: 5;
            pointer-events: none;
        }

        .wish {
            position: absolute;
            left: var(--x);
            top: var(--y);
            white-space: nowrap;
            transform: translate(-50%, -50%) rotate(var(--rotate));
            color: var(--wish-text);
            font-family: "STKaiti", "KaiTi", "STSong", "FangSong", serif;
            font-size: clamp(1rem, 2vw, 1.45rem);
            letter-spacing: 0.06em;
            text-shadow:
                0 0 10px rgba(255, 223, 181, 0.78),
                0 0 20px rgba(255, 177, 217, 0.3),
                1px 1px 0 var(--wish-outline);
            animation: wishFade 2.1s ease-out forwards;
        }

        .hint {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 4.4vh;
            z-index: 4;
            pointer-events: none;
        }

        .hint span {
            padding: 0.75rem 1.3rem;
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 999px;
            background: rgba(4, 13, 32, 0.28);
            backdrop-filter: blur(8px);
            color: rgba(239, 246, 255, 0.8);
            font-size: clamp(0.85rem, 1.6vw, 1rem);
            letter-spacing: 0.08em;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2);
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.45;
                filter: saturate(0.9);
            }
            50% {
                opacity: 1;
                filter: saturate(1.2);
            }
        }

        @keyframes floatDrift {
            0%, 100% {
                margin-top: -2px;
            }
            50% {
                margin-top: 3px;
            }
        }

        @keyframes dustTwinkle {
            0%, 100% {
                opacity: 0.18;
                transform: scale(0.8);
            }
            50% {
                opacity: 0.95;
                transform: scale(1.2);
            }
        }

        @keyframes wishFade {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) translate(0, 14px) scale(0.9) rotate(var(--rotate));
            }
            15% {
                opacity: 1;
            }
            72% {
                opacity: 0.94;
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) translate(var(--drift-x), var(--drift-y)) scale(1.08) rotate(var(--rotate));
            }
        }

        @media (max-width: 768px) {
            .title-wrap {
                top: 5vh;
            }

            .title-wrap p {
                width: min(82vw, 560px);
            }

            .hint {
                padding-bottom: 3.2vh;
            }

            .hint span {
                padding: 0.68rem 1rem;
                max-width: 86vw;
                text-align: center;
                line-height: 1.6;
            }
        }
    </style>
</head>

            for (let i = 0; i < count; i += 1) {
                const point = document.createElement("span");
                point.className = "dust-point";
                const size = Math.random() * 2.6 + 1;
                point.style.width = `${size}px`;
                point.style.height = `${size}px`;
                point.style.left = `${Math.random() * 100}%`;
                point.style.top = `${Math.random() * 100}%`;
                point.style.animationDuration = `${Math.random() * 5 + 3.8}s`;
                point.style.animationDelay = `${Math.random() * -6}s`;
                dust.appendChild(point);
            }
        }

        function heartPoint(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x, y };
        }

        function createHeartStars() {
            const totalStars = 88;
            const width = window.innerWidth;
            const height = window.innerHeight;
            const mobile = width < 768;
            const scale = mobile ? Math.min(width, height) * 0.017 : Math.min(width, height) * 0.019;
            const centerX = width / 2;
            const centerY = height * (mobile ? 0.58 : 0.55);

            heartStars.innerHTML = "";

            for (let i = 0; i < totalStars; i += 1) {
                const t = (Math.PI * 2 * i) / totalStars;
                const point = heartPoint(t);
                const jitterX = (Math.random() - 0.5) * (mobile ? 13 : 18);
                const jitterY = (Math.random() - 0.5) * (mobile ? 13 : 18);
                const x = centerX + point.x * scale + jitterX;
                const y = centerY - point.y * scale + jitterY;
                const star = document.createElement("button");
                const size = Math.random() * (mobile ? 10 : 12) + (mobile ? 10 : 12);
                star.className = "star";
                star.type = "button";
                star.style.left = `${x}px`;
                star.style.top = `${y}px`;
                star.style.setProperty("--size", `${size}px`);
                star.style.setProperty("--delay", `${(Math.random() * 2.8).toFixed(2)}s`);
                star.style.setProperty("--twinkle-duration", `${(Math.random() * 2.6 + 1.8).toFixed(2)}s`);
                star.style.setProperty("--float-duration", `${(Math.random() * 3.8 + 3.2).toFixed(2)}s`);
                star.setAttribute("aria-label", "点亮董昊闻的祝福星星");
                star.addEventListener("click", () => burstWishes(x, y));
                heartStars.appendChild(star);
            }
        }

        function pickBlessings(count) {
            const pool = [...blessings];
            const result = [];
            const total = Math.min(count, pool.length);

            for (let i = 0; i < total; i += 1) {
                const index = Math.floor(Math.random() * pool.length);
                result.push(pool.splice(index, 1)[0]);
            }

            return result;
        }

        function burstWishes(originX, originY) {
            const width = window.innerWidth;
            const height = window.innerHeight;
            const wishes = pickBlessings(window.innerWidth < 768 ? 8 : 10);

            wishes.forEach((text, index) => {
                const wish = document.createElement("div");
                const angle = (Math.PI * 2 * index) / wishes.length + Math.random() * 0.35;
                const radius = (window.innerWidth < 768 ? 58 : 86) + Math.random() * (window.innerWidth < 768 ? 40 : 64);
                const targetX = Math.min(width - 60, Math.max(60, originX + Math.cos(angle) * radius));
                const targetY = Math.min(height - 60, Math.max(140, originY + Math.sin(angle) * radius));
                const driftX = `${(Math.random() - 0.5) * 28}px`;
                const driftY = `${-56 - Math.random() * 50}px`;
                wish.className = "wish";
                wish.textContent = text;
                wish.style.setProperty("--x", `${targetX}px`);
                wish.style.setProperty("--y", `${targetY}px`);
                wish.style.setProperty("--rotate", `${(Math.random() - 0.5) * 10}deg`);
                wish.style.setProperty("--drift-x", driftX);
                wish.style.setProperty("--drift-y", driftY);
                wish.style.animationDelay = `${index * 0.05}s`;
                wishLayer.appendChild(wish);

                window.setTimeout(() => {
                    wish.remove();
                }, 2300);
            });
        }

        let resizeTimer = null;

        window.addEventListener("resize", () => {
            window.clearTimeout(resizeTimer);
            resizeTimer = window.setTimeout(createHeartStars, 180);
        });

        createDust();
        createHeartStars();
    </script>
</body>
</html>
